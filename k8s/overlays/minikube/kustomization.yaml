apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../gateway
  - ../../users
  - ../../auctions
  - ../../rabbitmq
  - ../../redis

# For Minikube, use local images with Never pull policy
images:
  - name: api-gateway
    newName: api-gateway
    newTag: latest
  - name: users-service
    newName: users-service
    newTag: latest
  - name: auctions-service
    newName: auctions-service
    newTag: latest

# Set imagePullPolicy to Never for Minikube (local images)
patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: api-gateway
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: users
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: auctions
