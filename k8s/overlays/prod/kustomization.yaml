apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../gateway
  - ../../users
  - ../../auctions
  - ../../rabbitmq
  - ../../redis

# For Production (GKE - Google Kubernetes Engine)
# Change this registry to match your GCP project and repository
images:
  - name: api-gateway
    newName: asia-southeast1-docker.pkg.dev/noted-runway-472014-s2/auctions/api-gateway
    newTag: latest
  - name: users-service
    newName: asia-southeast1-docker.pkg.dev/noted-runway-472014-s2/auctions/users-service
    newTag: latest
  - name: auctions-service
    newName: asia-southeast1-docker.pkg.dev/noted-runway-472014-s2/auctions/auctions-service
    newTag: latest

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
      name: api-gateway
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
      name: users
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
      name: auctions
