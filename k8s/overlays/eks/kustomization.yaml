apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../gateway
  - ../../users
  - ../../auctions
  - ../../rabbitmq
  - ../../redis

# For EKS
# Change this registry to match your AWS ECR repository
images:
  - name: api-gateway
    newName: <your-aws-account-id>.dkr.ecr.<your-region>.amazonaws.com/api-gateway
    newTag: latest
  - name: users-service
    newName: <your-aws-account-id>.dkr.ecr.<your-region>.amazonaws.com/users-service
    newTag: latest
  - name: auctions-service
    newName: <your-aws-account-id>.dkr.ecr.<your-region>.amazonaws.com/auctions-service
    newTag: latest

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
      name: api-gateway
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
      name: users
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
      name: auctions
  - patch: |-
      - op: replace
        path: /spec/type
        value: ClusterIP
    target:
      kind: Service
      name: api-gateway
  - patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.<your-domain>
      - op: replace
        path: /spec/rules/0/host
        value: api.<your-domain>
    target:
      kind: Ingress
      name: api-gateway-ingress
  - patch: |-
      - op: replace
        path: /spec/acme/email
        value: <your-email@example.com>
    target:
      kind: ClusterIssuer
      name: letsencrypt
